name: Package Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create ZIP package
        run: |
          mkdir -p Wallpaper-Setter-Bypass
          cp wallpaper_setter.ps1 Wallpaper-Setter-Bypass/
          cp launcher.bat Wallpaper-Setter-Bypass/
          cp .package/README.txt Wallpaper-Setter-Bypass/
          zip -r Wallpaper-Setter-Bypass_v${{ steps.version.outputs.VERSION }}.zip Wallpaper-Setter-Bypass/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wallpaper-Setter-Bypass-v${{ steps.version.outputs.VERSION }}
          path: Wallpaper-Setter-Bypass_v*.zip
          retention-days: 90
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Wallpaper-Setter-Bypass_v*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
